<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리눅스 & C언어 스마트 퀴즈</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #f59e0b;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.15);
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            text-align: center;
            font-size: 1.1rem;
            border: none;
            margin-top: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .question-box {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .explanation-box {
            background: rgba(56, 189, 248, 0.1);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #e2e8f0;
            margin-top: 15px;
            display: none;
        }

        .btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        .btn.wrong {
            background: var(--danger) !important;
            color: white;
            border-color: var(--danger);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .record-badge {
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<!-- BGM 오디오 파일 추가 -->
<audio id="bgm" src="bgm.mp3" loop></audio>

<div class="app-container">
    <!-- 메인 화면 -->
    <div id="home-screen" class="screen active">
        <h1>★ 스마트 퀴즈 ★</h1>
        <div class="record-badge" id="main-highscore">🏆 최고 기록: 0점</div>
        <button class="btn btn-primary" onclick="showCategoryScreen()">🎮 퀴즈 시작</button>
        <button class="btn" style="text-align:center; margin-top:8px;" onclick="resetScore()">🧹 기록 리셋</button>
    </div>

    <!-- 분야 선택 화면 -->
    <div id="category-screen" class="screen">
        <h1>📚 분야 선택</h1>
        <button class="btn" onclick="startGame('LINUX')">🐧 1) 리눅스 / Bash 명령어 (15문항)</button>
        <button class="btn" onclick="startGame('C_LANG')">💻 2) C언어 핵심 기초 (15문항)</button>
        <button class="btn" style="text-align:center; background:transparent; border:none;" onclick="showHome()">⬅️ 이전으로</button>
    </div>

    <!-- 퀴즈 진행 화면 -->
    <div id="quiz-screen" class="screen">
        <div class="status-bar">
            <span>점수: <strong id="score" style="color:var(--accent)">0</strong></span>
            <span>목숨: <span id="lives">❤️❤️❤️</span></span>
        </div>
        <div style="font-size:0.85rem; color:var(--text-sub); margin-bottom:8px;" id="round-info">제 1 라운드</div>
        <div class="question-box" id="question-text">문제가 여기에 표시됩니다.</div>
        
        <div id="options-container">
            <!-- 보기 버튼 4개 동적 생성 -->
        </div>

        <div id="explanation-box" class="explanation-box">
            💡 <strong>해설:</strong> <span id="explanation-text"></span>
        </div>

        <button id="next-btn" class="btn btn-primary" style="display:none; margin-top:15px;" onclick="nextQuestion()">다음 문제 ➡️</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen">
        <h1>🎉 게임 종료!</h1>
        <div style="text-align:center; font-size:1.3rem; margin:20px 0;" id="final-score">이번 판 점수: 0점</div>
        <div class="record-badge" id="result-highscore">🏆 최고 기록: 0점</div>
        <button class="btn btn-primary" onclick="showHome()">🏠 메인으로 돌아가기</button>
    </div>
</div>

<script>
    // 총 30문항 (리눅스 15개, C언어 15개)
    const quizData = [
        // ==================== [LINUX 카테고리 (15문항)] ====================
        { cat: "LINUX", q: "[명령어] 현재 위치한 디렉터리의 절대 경로를 출력하는 명령어는?", opts: ["1) pwd", "2) ls", "3) cd", "4) mkdir"], ans: 1, exp: "pwd는 'Print Working Directory'의 약자로 현재 디렉터리 경로를 보여줍니다." },
        { cat: "LINUX", q: "[명령어] 디렉터리 내의 파일 및 폴더 목록을 조회하는 명령어는?", opts: ["1) dir", "2) ls", "3) show", "4) list"], ans: 2, exp: "ls는 'List'의 약자로 디렉터리의 파일/폴더 목록을 출력합니다." },
        { cat: "LINUX", q: "[명령어] 새로운 디렉터리(폴더)를 생성할 때 사용하는 명령어는?", opts: ["1) touch", "2) cat", "3) mkdir", "4) newdir"], ans: 3, exp: "mkdir은 'Make Directory'의 약자로 새 디렉터리를 만듭니다." },
        { cat: "LINUX", q: "[명령어] 파일이나 폴더의 위치를 이동시키거나 이름을 변경하는 명령어는?", opts: ["1) cp", "2) mv", "3) rm", "4) touch"], ans: 2, exp: "mv는 'Move'의 약자로 파일 이동 및 이름 변경 역할을 동시에 수행합니다." },
        { cat: "LINUX", q: "[명령어] 빈 파일 생성 및 파일의 최종 수정 시간을 갱신하는 명령어는?", opts: ["1) touch", "2) create", "3) nano", "4) echo"], ans: 1, exp: "touch는 크기가 0인 빈 파일을 신규 생성할 때 유용하게 쓰입니다." },
        { cat: "LINUX", q: "[명령어] 파일이나 디렉터리를 삭제할 때 사용하는 명령어는?", opts: ["1) del", "2) erase", "3) rm", "4) unlink"], ans: 3, exp: "rm은 'Remove'의 약자로 파일이나 디렉터리를 삭제합니다. (디렉터리 삭제 시 -r 옵션)" },
        { cat: "LINUX", q: "[명령어] 텍스트 파일의 전체 내용을 터미널 화면에 출력하는 명령어는?", opts: ["1) cat", "2) print", "3) view", "4) echo"], ans: 1, exp: "cat은 'Concatenate'의 약자로 파일 내용을 연결하거나 화면에 출력합니다." },
        { cat: "LINUX", q: "[명령어] 터미널 화면의 복잡한 출력 내용을 모두 지우는 명령어는?", opts: ["1) cls", "2) clean", "3) clear", "4) flush"], ans: 3, exp: "clear 명령어는 터미널 화면을 깨끗하게 정리해 줍니다. (리눅스 전용)" },
        { cat: "LINUX", q: "[명령어] 파일이나 디렉터리를 복사할 때 사용하는 명령어는?", opts: ["1) copy", "2) cp", "3) dup", "4) clone"], ans: 2, exp: "cp는 'Copy'의 약자로 파일/디렉터리를 복사합니다." },
        { cat: "LINUX", q: "[권한] 파일의 읽기, 쓰기, 실행 권한(Permission)을 변경하는 명령어는?", opts: ["1) chown", "2) chmod", "3) chgrp", "4) umask"], ans: 2, exp: "chmod는 'Change Mode'의 약자로 권한 모드를 변경합니다." },
        { cat: "LINUX", q: "[검색] 파일 내부에서 특정 문자열이나 패턴을 검색하는 명령어는?", opts: ["1) find", "2) grep", "3) locate", "4) search"], ans: 2, exp: "grep은 강력한 패턴 검색 도구로 텍스트 파일 내 키워드를 찾아냅니다." },
        { cat: "LINUX", q: "[시스템] 현재 실행 중인 프로세스 목록을 확인하는 명령어는?", opts: ["1) ps", "2) proc", "3) task", "4) jobs"], ans: 1, exp: "ps는 'Process Status'의 약자로 현재 활성화된 프로세스 상태를 표시합니다." },
        { cat: "LINUX", q: "[시스템] 최고 관리자(root) 권한으로 명령을 실행하기 위해 사용하는 키워드는?", opts: ["1) admin", "2) root", "3) sudo", "4) runas"], ans: 3, exp: "sudo는 'SuperUser DO'의 약자로 관리자 권한을 빌려 명령을 수행합니다." },
        { cat: "LINUX", q: "[네트워크] 네트워크 연결 상태 및 수신 여부를 패킷으로 테스트하는 명령어는?", opts: ["1) ping", "2) trace", "3) netstat", "4) curl"], ans: 1, exp: "ping은 대상 호스트와의 통신 상태를 체크하는 대표적인 도구입니다." },
        { cat: "LINUX", q: "[편집기] 터미널 환경에서 가장 대중적이고 직관적인 텍스트 에디터는?", opts: ["1) notepad", "2) nano", "3) gedit", "4) word"], ans: 2, exp: "nano는 터미널 기반의 단순하고 사용하기 쉬운 텍스트 편집기입니다." },

        // ==================== [C_LANG 카테고리 (15문항)] ====================
        { cat: "C_LANG", q: "[기초] C언어 프로그램이 실행될 때 가장 먼저 호출되는 필수 함수는?", opts: ["1) start()", "2) init()", "3) main()", "4) run()"], ans: 3, exp: "C언어 프로그램의 실행 시작점(Entry Point)은 항상 main() 함수입니다." },
        { cat: "C_LANG", q: "[변수] 정수형 데이터를 저장하기 위해 사용하는 대표적인 자료형 키워드는?", opts: ["1) float", "2) char", "3) int", "4) double"], ans: 3, exp: "int는 Integer(정수)의 약자로 정수형 변수를 선언할 때 사용합니다." },
        { cat: "C_LANG", q: "[출력] 화면에 정수형 변수의 값을 출력할 때 사용하는 서식 지정자는?", opts: ["1) %c", "2) %d", "3) %f", "4) %s"], ans: 2, exp: "%d는 Decimal(10진수 정수)의 약자로 정수를 출력할 때 매핑됩니다." },
        { cat: "C_LANG", q: "[입력] 키보드로부터 값을 입력받기 위해 사용하는 표준 C 라이브러리 함수는?", opts: ["1) printf", "2) input", "3) scanf", "4) get"], ans: 3, exp: "scanf는 표준 입력 스트림(stdin)으로부터 지정된 양식의 데이터를 받습니다." },
        { cat: "C_LANG", q: "[문법] 조건문의 결과에 따라 다른 코드를 실행하는 대표적인 제어문은?", opts: ["1) for", "2) while", "3) if", "4) switch"], ans: 3, exp: "if 문은 조건식의 참/거짓 판단을 통해 분기 처리를 담당합니다." },
        { cat: "C_LANG", q: "[반복문] 정해진 횟수만큼 코드를 반복 실행할 때 가장 많이 쓰는 문법은?", opts: ["1) for", "2) do-while", "3) goto", "4) if"], ans: 1, exp: "for 문은 초기식, 조건식, 증감식을 한 줄에 작성하여 반복을 제어합니다." },
        { cat: "C_LANG", q: "[포인터] 변수의 메모리 주소 값을 저장하는 특수 변수는?", opts: ["1) 배열", "2) 포인터", "3) 구조체", "4) 상수"], ans: 2, exp: "포인터(Pointer)는 다른 변수가 위치한 '메모리 주소'를 값으로 가지는 변수입니다." },
        { cat: "C_LANG", q: "[자료형] 한 글자(문자)를 저장하기 위해 사용되는 1바이트 자료형 키워드는?", opts: ["1) char", "2) string", "3) byte", "4) text"], ans: 1, exp: "char는 Character의 약자로 1바이트 크기의 단일 문자를 저장합니다." },
        { cat: "C_LANG", q: "[메모리] 메모리 주소를 얻어오기 위해 변수 앞에 붙이는 연산자는?", opts: ["1) *", "2) &", "3) %", "4) #"], ans: 2, exp: "&(주소 연산자)는 해당 변수가 할당된 메모리의 시작 주소를 반환합니다." },
        { cat: "C_LANG", q: "[연산자] 두 값이 서로 같은지 비교할 때 사용하는 관계 연산자는?", opts: ["1) =", "2) ==", "3) !=", "4) =>"], ans: 2, exp: "동등 비교에는 '=='를 사용하며, '='는 값의 대입(할당)을 뜻합니다." },
        { cat: "C_LANG", q: "[전처리기] 헤더 파일(stdio.h 등)을 코드에 포함할 때 쓰는 전처리 지시자는?", opts: ["1) #define", "2) #include", "3) #import", "4) #using"], ans: 2, exp: "#include는 지정된 헤더 파일의 내용을 소스코드에 삽입합니다." },
        { cat: "C_LANG", q: "[문자열] C언어에서 문자열의 끝을 알리기 위해 자동으로 들어가는 문자는?", opts: ["1) Enter", "2) Space", "3) 널 문자 (\\0)", "4) EOF"], ans: 3, exp: "C언어 문자열은 반드시 널 문자('\\0', Null Character)로 종료되어야 합니다." },
        { cat: "C_LANG", q: "[자료형] 실수(소수점)를 표현하기 위해 사용하는 4바이트 자료형은?", opts: ["1) int", "2) float", "3) long", "4) short"], ans: 2, exp: "float은 단정밀도 실수(소수)를 표현하는 4바이트 자료형입니다." },
        { cat: "C_LANG", q: "[구조체] 여러 서로 다른 자료형의 변수들을 하나로 묶어 정의하는 키워드는?", opts: ["1) array", "2) struct", "3) union", "4) class"], ans: 2, exp: "struct(구조체)는 복합 데이터 타입을 사용자가 직접 만들 때 사용합니다." },
        { cat: "C_LANG", q: "[메모리] 포인터 변수가 가리키는 실제 메모리의 값에 접근할 때 쓰는 연산자는?", opts: ["1) & (주소 연산자)", "2) * (역참조 연산자)", "3) -> (화살표 연산자)", "4) . (점 연산자)"], ans: 2, exp: "*(역참조 연산자)는 포인터가 지리키는 메모리 주소의 '실제 데이터'를 가져옵니다." }
    ];

    let currentBank = [];
    let currentIdx = 0;
    let score = 0;
    let lives = 3;
    let highScore = localStorage.getItem('quiz_high_score') || 0;

    function updateHighScoreUI() {
        document.getElementById('main-highscore').innerText = `🏆 최고 기록: ${highScore}점`;
        document.getElementById('result-highscore').innerText = `🏆 최고 기록: ${highScore}점`;
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function showHome() {
        updateHighScoreUI();
        showScreen('home-screen');
    }

    function showCategoryScreen() {
        showScreen('category-screen');
    }

    function startGame(category) {
// 🎵 모바일 대응 BGM 재생
    const bgm = document.getElementById('bgm');
    if (bgm) {
        bgm.currentTime = 0; // 처음부터 재생
        bgm.play().catch(e => {
            console.log("모바일 자동재생 제한, 터치 이벤트 대기 중:", e);
        });
    }

    currentBank = quizData.filter(q => q.cat === category);
    currentBank.sort(() => Math.random() - 0.5);
    
    currentIdx = 0;
    score = 0;
    lives = 3;
    
    showScreen('quiz-screen');
    renderQuestion();
    }

    function renderQuestion() {
    const q = currentBank[currentIdx];
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = '❤️'.repeat(lives);
    document.getElementById('round-info').innerText = `제 ${currentIdx + 1} 라운드 / 총 ${currentBank.length}문제`;
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    // 1. 기존 데이터에서 "1) ", "2) " 같은 앞쪽 번호 정규식으로 떼어내기
    const shuffledOptions = q.opts.map((optText, index) => ({
        cleanText: optText.replace(/^[0-9]\)\s*/, ''), // 앞의 번호(1) ) 제거
        originalIndex: index + 1                       // 데이터 상의 원래 정답 번호
    }));
    
    // 2. 피셔-예이츠 셔플로 선택지 무작위 섞기
    for (let i = shuffledOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
    }

    // 3. 섞인 순서대로 1), 2), 3), 4) 번호를 깔끔하게 재할당하여 버튼 생성
    shuffledOptions.forEach((optObj, displayIdx) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        
        // 화면에는 항상 1), 2), 3), 4) 순서로 표시!
        btn.innerText = `${displayIdx + 1}) ${optObj.cleanText}`;
        
        // 클릭 시 원래 정답 번호(originalIndex)와 비교
        btn.onclick = () => selectAnswer(optObj.originalIndex, q.ans, btn);
        container.appendChild(btn);
    });
    }

    function selectAnswer(selected, correct, btnElement) {
        const buttons = document.querySelectorAll('#options-container .btn');
        buttons.forEach(b => b.disabled = true); // 중복 터치 방지

        const expBox = document.getElementById('explanation-box');
        const expText = document.getElementById('explanation-text');
        expText.innerText = currentBank[currentIdx].exp;
        expBox.style.display = 'block';

        if (selected === correct) {
            btnElement.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
        } else {
            btnElement.classList.add('wrong');
            // 정답 강조
            buttons[correct - 1].classList.add('correct');
            lives -= 1;
            document.getElementById('lives').innerText = '❤️'.repeat(lives);
        }

        if (lives === 0 || currentIdx === currentBank.length - 1) {
            document.getElementById('next-btn').innerText = "결과 보기 📊";
        } else {
            document.getElementById('next-btn').innerText = "다음 문제 ➡️";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        if (lives === 0 || currentIdx === currentBank.length - 1) {
            endGame();
        } else {
            currentIdx++;
            renderQuestion();
        }
    }

    function endGame() {
        document.getElementById('final-score').innerText = `이번 판 점수: ${score}점`;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('quiz_high_score', highScore);
        }
        updateHighScoreUI();
        showScreen('result-screen');
    }

    function resetScore() {
        if (confirm("최고 기록을 리셋하시겠습니까?")) {
            highScore = 0;
            localStorage.removeItem('quiz_high_score');
            updateHighScoreUI();
        }
    }

// 📱 모바일 브라우저 BGM 오디오 잠금 해제 (최초 1회 터치 시 작동)
function unlockAudio() {
    const bgm = document.getElementById('bgm');
    if (bgm) {
        bgm.play().then(() => {
            // 메인 화면일 때는 일단 일시정지 (게임 시작 시 재생되도록)
            if (document.getElementById('home-screen').classList.contains('active')) {
                bgm.pause();
                bgm.currentTime = 0;
            }
        }).catch(() => {});
    }
    // 한 번 터치하면 이벤트 제거
    document.removeEventListener('touchstart', unlockAudio);
    document.removeEventListener('click', unlockAudio);
}

document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });
    // 초기화
    updateHighScoreUI();
</script>
</body>
</html>
